<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="./14-projeto-style.css">
    <title>Convert Money</title>
</head>

<body>
    <div class="conteiner">
        <header>
            <h1><b>Convert Money</b></h1>
        </header>

        <main>
            <label>
                converter <b>de</b>:
                <select>
                    <option>R$ Real Brasileiro</option>
                </select>
            </label>
            <label>
               <b>para</b>:
                <select>
                    <option>USR$ Dolar Americano</option>
                    <option>€ Euro</option>
                </select>
            </label>

            <label>
                valor
                <input id="valueInput" placeholder="R$ 10.000.00">
            </label>
            <button id="idButton" type="button">Converter</button>
        
        <section>
            <div class="currency-conteiner">
                <img src="./assets/brasil 2.png" alt="bandeira-brasil">
                <p class="currency-name">Real</p>
                <p class="currency-value">R$ 10.000.00</p>
            </div>
            <img class="arrow-img" src="./assets/Vector.png" alt="seta">
            <div class="currency-conteiner" >
                <img src="./assets/estados-unidos (1) 1.png" alt="bandeira-conversor">
                <p class="currency-name">Dólar Americano</p>
                <p class="currency-value">US$ 2.000.00</p>
            </div>
        </section>
    </div>
</main>
</body>
