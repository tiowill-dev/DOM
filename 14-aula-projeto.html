<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Convert Money</title>
</head>

<body>
    <div>
        <reader>
            <h1>Convert Money</h1>
        </reader>

        <main>
            <label>
                converter de:
                <select>
                    <option>R$ Real Brasileiro</option>
                </select>
            </label>
            <label>
                para:
                <select>
                    <option>USR$ Dolar Americano</option>
                    <option>€ Euro</option>
                </select>
            </label>

            <label>
                valor
                <input placeholder="R$ 10.000.00">
            </label>
            <button type="button">Converter</button>
        </main>
        <section></section>
        <section>
            <div>
                <img src="./assets/brasil 2.png">
                <p>Real Brasileiro</p>
                <p>R$ 10.000.00</p>
            </div>
            <img src="./assets/Vector.png">
            <div>
                <img src="./assets/estados-unidos (1) 1.png">
                <p>Dólar Americano</p>
                <p>US$ 2.000.00</p>
            </div>
        </section>
    </div>

</body>

</html>
